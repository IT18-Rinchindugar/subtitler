services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: subtitle
      POSTGRES_PASSWORD: subtitle
      POSTGRES_DB: subtitle_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subtitle -d subtitle_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the S3 bucket on first run
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/subtitle-videos &&
        mc anonymous set download local/subtitle-videos
      "
    restart: "no"

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://subtitle:subtitle@postgres:5432/subtitle_app
      JWT_SECRET: change_me_in_production
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: subtitle-videos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      TRANSCRIBER_URL: http://transcriber:8001
      INTERNAL_SECRET: internal_secret_change_me
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/api:/app
      - /app/node_modules

  transcriber:
    build:
      context: ./backend/transcriber
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: subtitle-videos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      API_CALLBACK_URL: http://api:3001/api/internal/transcription-complete
      INTERNAL_SECRET: internal_secret_change_me
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - whisper_cache:/root/.cache/huggingface

volumes:
  postgres_data:
  minio_data:
  whisper_cache:
